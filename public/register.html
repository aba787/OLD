<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب - رعاية</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <a href="/"><h1>رعاية</h1></a>
    </div>
    <div class="nav-links">
      <a href="/login" class="btn btn-outline">تسجيل الدخول</a>
    </div>
  </nav>

  <main class="auth-container">
    <div class="auth-card auth-card-wide">
      <h2>إنشاء حساب جديد</h2>
      <p class="auth-subtitle">انضم إلى مجتمع التطوع</p>

      <div id="error-message" class="alert alert-error hidden"></div>
      <div id="success-message" class="alert alert-success hidden"></div>

      <form id="register-form">
        <!-- Role Selection - اختيار نوع الحساب -->
        <div class="form-group">
          <label>أسجل كـ:</label>
          <div class="role-selector">
            <label class="role-option">
              <input type="radio" name="role" value="elderly" required>
              <span class="role-card">
                <span class="role-icon">&#128116;</span>
                <span class="role-name">مستخدم مسن</span>
                <span class="role-desc">أحتاج مساعدة في المهام اليومية</span>
              </span>
            </label>
            <label class="role-option">
              <input type="radio" name="role" value="volunteer">
              <span class="role-card">
                <span class="role-icon">&#128588;</span>
                <span class="role-name">متطوع</span>
                <span class="role-desc">أريد مساعدة الآخرين</span>
              </span>
            </label>
            <label class="role-option">
              <input type="radio" name="role" value="organization">
              <span class="role-card">
                <span class="role-icon">&#127970;</span>
                <span class="role-name">منظمة</span>
                <span class="role-desc">جمعية خيرية أو منظمة غير ربحية</span>
              </span>
            </label>
          </div>
        </div>

        <!-- Basic Information - المعلومات الأساسية -->
        <div class="form-row">
          <div class="form-group">
            <label for="fullName">الاسم الكامل *</label>
            <input 
              type="text" 
              id="fullName" 
              name="fullName" 
              required 
              placeholder="أدخل اسمك الكامل"
            >
          </div>
          <div class="form-group">
            <label for="phone">رقم الهاتف</label>
            <input 
              type="tel" 
              id="phone" 
              name="phone" 
              placeholder="أدخل رقم هاتفك"
            >
          </div>
        </div>

        <div class="form-group">
          <label for="email">البريد الإلكتروني *</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            required 
            placeholder="أدخل بريدك الإلكتروني"
            autocomplete="email"
          >
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="password">كلمة المرور *</label>
            <input 
              type="password" 
              id="password" 
              name="password" 
              required 
              placeholder="أنشئ كلمة مرور"
              minlength="6"
              autocomplete="new-password"
            >
          </div>
          <div class="form-group">
            <label for="confirmPassword">تأكيد كلمة المرور *</label>
            <input 
              type="password" 
              id="confirmPassword" 
              name="confirmPassword" 
              required 
              placeholder="أعد كتابة كلمة المرور"
              minlength="6"
              autocomplete="new-password"
            >
          </div>
        </div>

        <div class="form-group">
          <label for="address">العنوان</label>
          <input 
            type="text" 
            id="address" 
            name="address" 
            placeholder="أدخل عنوانك (اختياري)"
          >
        </div>

        <!-- Organization-specific fields - حقول خاصة بالمنظمات -->
        <div id="org-fields" class="hidden">
          <div class="form-group">
            <label for="organizationName">اسم المنظمة *</label>
            <input 
              type="text" 
              id="organizationName" 
              name="organizationName" 
              placeholder="أدخل اسم المنظمة"
            >
          </div>
          <div class="form-group">
            <label for="registrationNumber">رقم التسجيل</label>
            <input 
              type="text" 
              id="registrationNumber" 
              name="registrationNumber" 
              placeholder="رقم التسجيل الرسمي"
            >
          </div>
        </div>

        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="terms" required>
            <span>أوافق على <a href="#" target="_blank">شروط الاستخدام</a> و<a href="#" target="_blank">سياسة الخصوصية</a></span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="register-btn">
          <span id="register-text">إنشاء الحساب</span>
          <span id="register-loading" class="hidden">جارٍ إنشاء الحساب...</span>
        </button>
      </form>

      <div class="auth-footer">
        <p>لديك حساب بالفعل؟ <a href="/login">سجل دخولك هنا</a></p>
      </div>

    </div>
  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/data-api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
