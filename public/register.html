<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - CareConnect</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <a href="/"><h1>CareConnect</h1></a>
    </div>
    <div class="nav-links">
      <a href="/login" class="btn btn-outline">Login</a>
    </div>
  </nav>

  <main class="auth-container">
    <div class="auth-card auth-card-wide">
      <h2>Create Account</h2>
      <p class="auth-subtitle">Join our volunteer community</p>

      <div id="error-message" class="alert alert-error hidden"></div>
      <div id="success-message" class="alert alert-success hidden"></div>

      <form id="register-form">
        <!-- Role Selection -->
        <div class="form-group">
          <label>I am registering as:</label>
          <div class="role-selector">
            <label class="role-option">
              <input type="radio" name="role" value="elderly" required>
              <span class="role-card">
                <span class="role-icon">&#128116;</span>
                <span class="role-name">Elderly User</span>
                <span class="role-desc">Need help with daily tasks</span>
              </span>
            </label>
            <label class="role-option">
              <input type="radio" name="role" value="volunteer">
              <span class="role-card">
                <span class="role-icon">&#128588;</span>
                <span class="role-name">Volunteer</span>
                <span class="role-desc">Want to help others</span>
              </span>
            </label>
            <label class="role-option">
              <input type="radio" name="role" value="organization">
              <span class="role-card">
                <span class="role-icon">&#127970;</span>
                <span class="role-name">Organization</span>
                <span class="role-desc">Charity or NGO</span>
              </span>
            </label>
          </div>
        </div>

        <!-- Basic Information -->
        <div class="form-row">
          <div class="form-group">
            <label for="fullName">Full Name *</label>
            <input 
              type="text" 
              id="fullName" 
              name="fullName" 
              required 
              placeholder="Enter your full name"
            >
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input 
              type="tel" 
              id="phone" 
              name="phone" 
              placeholder="Enter phone number"
            >
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address *</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            required 
            placeholder="Enter your email"
            autocomplete="email"
          >
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="password">Password *</label>
            <input 
              type="password" 
              id="password" 
              name="password" 
              required 
              placeholder="Create a password"
              minlength="6"
            >
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password *</label>
            <input 
              type="password" 
              id="confirmPassword" 
              name="confirmPassword" 
              required 
              placeholder="Confirm your password"
              minlength="6"
            >
          </div>
        </div>

        <div class="form-group">
          <label for="address">Address</label>
          <input 
            type="text" 
            id="address" 
            name="address" 
            placeholder="Enter your address (optional)"
          >
        </div>

        <!-- Organization-specific fields (hidden by default) -->
        <div id="org-fields" class="hidden">
          <div class="form-group">
            <label for="organizationName">Organization Name *</label>
            <input 
              type="text" 
              id="organizationName" 
              name="organizationName" 
              placeholder="Enter organization name"
            >
          </div>
          <div class="form-group">
            <label for="registrationNumber">Registration Number</label>
            <input 
              type="text" 
              id="registrationNumber" 
              name="registrationNumber" 
              placeholder="Official registration number"
            >
          </div>
        </div>

        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="terms" required>
            <span>I agree to the <a href="#" target="_blank">Terms of Service</a> and <a href="#" target="_blank">Privacy Policy</a></span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="register-btn">
          <span id="register-text">Create Account</span>
          <span id="register-loading" class="hidden">Creating account...</span>
        </button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="/login">Login here</a></p>
      </div>

      <div class="auth-note">
        <p><strong>Note:</strong> Volunteer and Organization accounts require admin approval before full access is granted.</p>
      </div>
    </div>
  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
