<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - رعاية</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <a href="/"><h1>رعاية</h1></a>
    </div>
    <div class="nav-links">
      <a href="/register" class="btn btn-outline">إنشاء حساب</a>
    </div>
  </nav>

  <main class="auth-container">
    <div class="auth-card">
      <h2>مرحباً بعودتك</h2>
      <p class="auth-subtitle">سجل دخولك إلى حسابك</p>

      <div id="error-message" class="alert alert-error hidden"></div>
      <div id="success-message" class="alert alert-success hidden"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">البريد الإلكتروني</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            required 
            placeholder="أدخل بريدك الإلكتروني"
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            required 
            placeholder="أدخل كلمة المرور"
            autocomplete="current-password"
            minlength="6"
          >
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          <span id="login-text">تسجيل الدخول</span>
          <span id="login-loading" class="hidden">جارٍ تسجيل الدخول...</span>
        </button>
      </form>

      <div class="auth-footer">
        <p>ليس لديك حساب؟ <a href="/register">أنشئ حساباً جديداً</a></p>
      </div>
    </div>
  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/data-api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
